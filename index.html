<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/hive-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Beetz Colmeia</title>
    <meta name="description" content="Colmeia Beetz — a comunidade interna de quem faz os maiores eventos acontecerem." />

    <!-- PWA: instalar na tela de início e abrir em tela cheia, sem a barra do navegador -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#050505" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Colmeia" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Registra o service worker só fora do localhost — em dev ele atrapalha
      // o hot reload do Vite servindo arquivo cacheado.
      if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {
            // Sem service worker o app funciona igual — só não instala offline.
          })
        })
      }
    </script>
  </body>
</html>
